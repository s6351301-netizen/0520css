<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* position static 預設 靜止的 */
        /* word 剛開始圖片不能動 */
        /* 設定成文繞圖 才可以動 */
        .box {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: lightblue;
            left: 300px;
            top:300px;
        }
    </style>
</head>

<body>
    <div class="box">

    </div>
</body>

</html>
