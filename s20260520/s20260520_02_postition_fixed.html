<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 2000px;
            background-color: lightpink;
        }

        /* fixed 常用 廣告 */
        .box {
            width: 300px;
            height: 300px;
            
        }
        
        .box1 {
            position: fixed;
            background-color: lightblue;
            right: 10px;
            bottom: 10px;
        }

        .box2 {

            /* 有些廣告 display:none 不顯示 */
            display: block;
            position: fixed;
            background-color: lightyellow;
            left: 10px;
            bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="box box1">

    </div>
    <div class="box box2">

    </div>
</body>

</html>
